repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: debug-statements
      - id: check-builddir
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        files: ^backend/
        args: [--line-length=88]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix, --line-length=88]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/
        additional_dependencies: [types-all]
        args: [--ignore-missing-imports]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.24.0
    hooks:
      - id: eslint
        files: ^feishin/
        types: [file]
        types_or: [javascript, jsx, ts, tsx]
        additional_dependencies:
          - eslint@9.24.0
          - "@typescript-eslint/eslint-plugin@8.24.0"
          - "@typescript-eslint/parser@8.24.0"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        files: ^feishin/
        types_or: [javascript, jsx, ts, tsx, json, css, scss, md]

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest
        language: system
        pass_filenames: true
        always_run: true
        files: ^backend/
        args: [--tb=short, -q]

      - id: frontend-typecheck
        name: frontend-typecheck
        entry: npm
        language: system
        pass_filenames: false
        always_run: true
        files: ^feishin/
        args: [--prefix, feishin, run, typecheck]

      - id: dockerfile-lint
        name: dockerfile-lint
        entry: hadolint
        language: system
        files: ^.*Dockerfile.*$

      - id: compose-lint
        name: compose-lint
        entry: docker-compose
        language: system
        files: ^docker-compose.*\.ya?ml$
        args: [-f, {files}, config]
